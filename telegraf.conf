# Telegraf config — bridges MQTT (Mosquitto) to InfluxDB Cloud

[agent]
  interval = "10s"
  flush_interval = "10s"

# --- MQTT Input: Sensor data (both modules) ---
[[inputs.mqtt_consumer]]
  servers = ["tcp://localhost:1883"]
  topics = ["hydrolab/+/environment"]
  data_format = "json_v2"
  topic_tag = ""

  [inputs.mqtt_consumer.tags]
    device = "rpi-01"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "hydrolab/+/environment"
    tags = "_/module/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "environment"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "temperature"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "humidity"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "water_level"
      type = "float"

# --- MQTT Input: Actuator state (both modules) ---
[[inputs.mqtt_consumer]]
  servers = ["tcp://localhost:1883"]
  topics = ["hydrolab/+/actuators"]
  data_format = "json_v2"
  topic_tag = ""

  [inputs.mqtt_consumer.tags]
    device = "rpi-01"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "hydrolab/+/actuators"
    tags = "_/module/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "actuators"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "peltier"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pump"
      type = "boolean"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "mister"
      type = "boolean"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "grow_light"
      type = "boolean"

# --- InfluxDB Cloud Output ---
[[outputs.influxdb_v2]]
  urls = ["YOUR_INFLUXDB_URL"]
  token = "YOUR_INFLUXDB_TOKEN"
  organization = "YOUR_INFLUXDB_ORG"
  bucket = "hydrolab"
